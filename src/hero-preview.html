<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Preview — Vegas Wash Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: 'Barlow', sans-serif; color: #111827; }
    img { max-width: 100%; }
  </style>
  <link rel="stylesheet" href="styles/hero.css">
</head>
<body>
  <!-- Hero component inline -->
  <section class="hero" id="hero">
    <div class="hero__container">

      <div class="hero__left">
        <h1 class="hero__headline">
          <span class="hero__headline--black">MAKE YOUR HOME LOOK FRESH AGAIN —</span>
          <span class="hero__headline--blue">WITHOUT SPENDING THOUSANDS</span>
        </h1>
        <p class="hero__subtext">
          Affordable pressure washing for driveways, sidewalks, patios, trash cans, and curb appeal in Summerlin &amp; Las Vegas.
        </p>
        <a href="#get-quote" class="hero__cta">GET MY FREE QUOTE</a>
        <div class="hero__trust-bar">
          <div class="hero__trust-item">
            <svg class="hero__trust-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#1A56DB" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            <span>FAST QUOTES</span>
          </div>
          <div class="hero__trust-divider" aria-hidden="true"></div>
          <div class="hero__trust-item">
            <svg class="hero__trust-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#1A56DB" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>LOCAL SERVICE</span>
          </div>
          <div class="hero__trust-divider" aria-hidden="true"></div>
          <div class="hero__trust-item">
            <svg class="hero__trust-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#1A56DB" aria-hidden="true"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
            <span>SUMMERLIN / LAS VEGAS AREA</span>
          </div>
        </div>
      </div>

      <div class="hero__right">
        <div class="hero__ba-slider" role="img" aria-label="Before and after pressure washing comparison">
          <div class="hero__ba-before">
            <img src="Design Images/Garage Before.png" alt="Before pressure washing" draggable="false" />
            <span class="hero__ba-label hero__ba-label--before">BEFORE</span>
          </div>
          <div class="hero__ba-after">
            <img src="Design Images/Garage After.png" alt="After pressure washing" draggable="false" />
            <span class="hero__ba-label hero__ba-label--after">AFTER</span>
          </div>
          <div class="hero__ba-handle" role="slider" aria-label="Drag to compare" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
            <div class="hero__ba-handle-line"></div>
            <button class="hero__ba-handle-btn" tabindex="-1" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            <div class="hero__ba-handle-line"></div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script type="module">
    import { init } from './js/hero.js';
    document.addEventListener('DOMContentLoaded', init);
    // Also call immediately in case DOM is already ready
    if (document.readyState !== 'loading') init();
  </script>
</body>
</html>
